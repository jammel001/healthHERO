<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HealthHero AI Assistant</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #f4f8fb;
    }

    .container {
      max-width: 800px;
      margin: auto;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #0b6efd;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .chat {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 75%;
      padding: 12px;
      border-radius: 15px;
      line-height: 1.5;
    }

    .user {
      align-self: flex-end;
      background: #0b6efd;
      color: white;
    }

    .ai {
      align-self: flex-start;
      background: white;
      border: 1px solid #ddd;
    }

    .typing {
      font-style: italic;
      color: #777;
    }

    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .options button {
      padding: 8px 12px;
      border-radius: 20px;
      border: none;
      background: #e0e7ff;
      cursor: pointer;
    }

    .input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ddd;
      background: white;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
      outline: none;
    }

    button.send {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      background: #0b6efd;
      color: white;
      border-radius: 20px;
      cursor: pointer;
    }

    .card {
      background: #fff;
      padding: 10px;
      border-radius: 10px;
      border-left: 5px solid #0b6efd;
      margin-top: 5px;
    }

    .severity {
      padding: 8px;
      border-radius: 8px;
      font-weight: bold;
    }

    .mild { background: #d1fae5; }
    .moderate { background: #fef3c7; }
    .severe { background: #fee2e2; }

    .actions {
      padding: 10px;
      text-align: center;
    }

    .actions button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      background: #0b6efd;
      color: white;
      cursor: pointer;
    }

    a {
      color: #0b6efd;
      text-decoration: none;
    }

  </style>
</head>

<body>

<div class="container">

  <header>🤖 HealthHero AI Assistant</header>

  <div id="chat" class="chat"></div>

  <div class="input-area">
    <input id="input" placeholder="Type your message...">
    <button class="send" onclick="sendMessage()">Send</button>
  </div>

  <div class="actions">
    <button onclick="downloadPDF()">📄 Download Report</button>
    <button onclick="restartChat()">🔄 Restart</button>
  </div>

</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');

let started = false;
let lastResult = null;

/* ================= UI ================= */

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = text.replace(/\n/g, "<br>");
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg ai typing';
  div.innerText = "Typing...";
  chat.appendChild(div);
  return div;
}

function showOptions(options) {
  const box = document.createElement('div');
  box.className = 'options';

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.innerText = opt;
    btn.onclick = () => sendMessage(opt);
    box.appendChild(btn);
  });

  chat.appendChild(box);
  chat.scrollTop = chat.scrollHeight;
}

function showPredictions(predictions) {
  predictions.forEach(p => {
    addMessage("ai",
      `<div class="card">
        <b>${p.rank}. ${p.condition}</b><br>
        Probability: ${p.probability}<br>
        Confidence: ${p.confidence}<br><br>
        ${p.description}<br><br>
        <b>Precautions:</b> ${p.precautions.join(", ")}
      </div>`
    );
  });
}

function showSeverity(level) {
  const cls = level.toLowerCase();
  addMessage("ai", `<div class="severity ${cls}">⚠️ Severity: ${level}</div>`);
}

/* ================= CORE ================= */

async function sendMessage(text=null) {
  const msg = text || input.value.trim();
  if (!msg) return;

  addMessage("user", msg);
  input.value = "";

  const typing = showTyping();

  try {
    const res = await fetch("/api/diagnose", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(started ? { reply: msg } : { symptoms: msg })
    });

    const data = await res.json();
    typing.remove();

    if (data.text) addMessage("ai", data.text);

    if (data.severity) showSeverity(data.severity);

    if (data.predictions) {
      showPredictions(data.predictions);
      lastResult = data;
    }

    if (data.hospital_link) {
      addMessage("ai",
        `🏥 <b>Find nearby hospitals:</b><br>
         <a href="${data.hospital_link}" target="_blank">Open Google Maps</a>`
      );
    }

    if (data.options) showOptions(data.options);

    if (data.disclaimer) addMessage("ai", data.disclaimer);

    started = true;

  } catch {
    typing.remove();
    addMessage("ai", "⚠️ Server error. Please try again.");
  }
}

/* ================= PDF ================= */

async function downloadPDF() {
  if (!lastResult) {
    alert("No diagnosis available yet.");
    return;
  }

  const res = await fetch("/api/download_pdf", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(lastResult)
  });

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "Health_Report.pdf";
  a.click();
}

/* ================= RESTART ================= */

function restartChat() {
  chat.innerHTML = "";
  started = false;
  lastResult = null;
  greet();
}

/* ================= EVENTS ================= */

input.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

/* ================= INIT ================= */

function greet() {
  addMessage("ai",
    "Hello 👋 I’m HealthHero.\n\n" +
    "⚠️ I am NOT a doctor. This is not a medical diagnosis.\n\n" +
    "How can I help you today?");
}

greet();

</script>

</body>
</html>
